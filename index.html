<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle K Việt Nam - Bản Clone</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="https://www.circlek.com.vn/wp-content/themes/circle-k/images/logo.png" alt="Circle K Logo" />
      </div>
      <nav>
        <ul>
          <li><a href="#">Trang chủ</a></li>
          <li><a href="#">Sản phẩm</a></li>
          <li><a href="#">Dịch vụ</a></li>
          <li><a href="#">Khuyến mãi</a></li>
          <li><a href="#">Tin tức</a></li>
          <li><a href="#" class="btn-store">Tìm cửa hàng</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1>
          CHÀO MỪNG ĐẾN VỚI
          <br />
          <span>CIRCLE K VIỆT NAM</span>
        </h1>
        <p>Mở cửa 24/7 - Luôn sẵn sàng phục vụ bạn.</p>
        <button onclick="saveToFirebase()">Nhận tin khuyến mãi</button>
      </div>
    </section>

    <section class="services">
      <h2>DỊCH VỤ CỦA CHÚNG TÔI</h2>
      <div class="service-container">
        <div class="card">
          <i class="fas fa-utensils"></i>
          <h3>Thức ăn nhanh</h3>
        </div>
        <div class="card">
          <i class="fas fa-coffee"></i>
          <h3>Đồ uống nóng/lạnh</h3>
        </div>
        <div class="card">
          <i class="fas fa-wifi"></i>
          <h3>Tiện ích 24/7</h3>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
