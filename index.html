<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle K Việt Nam - Clone</title>
    <link rel="icon" type="image/png" href="/img/images.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  </head>
  <body>
    <div class="top-bar">
      <div class="top-bar-content">
        <div class="top-links">
          <a href="#">Giới thiệu</a>
          |
          <a href="#">Cơ hội nghề nghiệp</a>
          |
          <a href="#">Tin tức & Sự kiện</a>
          |
          <a href="#">Liên hệ</a>
        </div>
        <div class="top-lang">
          <img src="https://flagcdn.com/w20/vn.png" alt="VN" />
          <span>Tiếng Việt</span>
        </div>
      </div>
    </div>

    <header>
      <div class="main-header">
        <div class="logo">
          <a href="index.html">
            <img src="/img/images1.png" alt="Circle K Logo" />
          </a>
        </div>

        <nav class="main-nav">
          <div class="nav-item">
            <i class="fas fa-store"></i>
            <span>Hệ thống Circle K</span>
          </div>
          <div class="nav-item">
            <i class="fas fa-gift"></i>
            <span>Ưu đãi đặc biệt</span>
          </div>
          <div class="nav-item">
            <i class="fas fa-hamburger"></i>
            <span>Thức ăn & Thức uống</span>
          </div>
          <div class="nav-item">
            <i class="fas fa-concierge-bell"></i>
            <span>Sản phẩm & Dịch vụ</span>
          </div>
          <div class="search-icon">
            <i class="fas fa-search"></i>
          </div>
          <a href="indexlogin.html" style="text-decoration: none">
            <div class="nav-item btn-login-nav">
              <i class="fas fa-user"></i>
              <span>Đăng nhập</span>
            </div>
          </a>
        </nav>
      </div>
    </header>

    <section class="hero-slider">
      <div class="slides-container">
        <div class="slide active">
          <img
            src="https://www.circlek.com.vn/wp-content/uploads/2026/01/1920x536_1920x536_acf_cropped_1920x536_acf_cropped.jpg"
            alt="Banner" />
          <div class="banner-tabs">
            <div class="tab active">HOT DEAL</div>
            <div class="tab">TÌM CỬA HÀNG</div>
            <div class="tab">TÌM VIỆC</div>
          </div>
        </div>
      </div>
    </section>

    <section class="services">
      <h2>DỊCH VỤ CỦA CHÚNG TÔI</h2>
      <div class="service-container">
        <div class="card">
          <i class="fas fa-utensils"></i>
          <h3>Thức ăn nhanh</h3>
        </div>
        <div class="card">
          <i class="fas fa-coffee"></i>
          <h3>Đồ uống</h3>
        </div>
        <div class="card">
          <i class="fas fa-wifi"></i>
          <h3>Tiện ích 24/7</h3>
        </div>
      </div>
    </section>

    <script type="module" src="js/script.js"></script>
  </body>
</html>
