<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ thống cửa hàng Convenia - Bình Thạnh</title>
    <link rel="stylesheet" href="../assets/css/base/style.css" />
    <link rel="stylesheet" href="../assets/css/pages/stores.css" />
    <link rel="stylesheet" href="../assets/css/themes/theme-lang.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
    <script type="module" src="../assets/js/utils/theme-lang.js"></script>
    <style>
      .distance-info {
        color: #df2027;
        font-weight: bold;
        font-size: 12px;
        margin-top: 5px;
        display: none;
      }
      .btn-route {
        margin-top: 8px;
        padding: 4px 10px;
        font-size: 11px;
        background: #eee;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
        display: none;
      }
      .btn-route:hover {
        background: #df2027;
        color: white;
        border-color: #df2027;
      }
    </style>
  </head>
  <body>
    <div class="store-container">
      <div class="store-list">
        <div class="back-home">
          <a href="index.html">
            <i class="fas fa-arrow-left"></i>
            Quay lại trang chủ
          </a>
        </div>

        <div class="store-search-box">
          <div class="search-container-store">
            <input type="text" id="store-search-input" placeholder="Tìm tên đường tại Bình Thạnh..." />
            <button type="button" id="btn-search-store"><i class="fas fa-search"></i></button>
          </div>
          <button
            onclick="askLocation()"
            style="
              width: 100%;
              margin-top: 10px;
              cursor: pointer;
              padding: 8px;
              border-radius: 20px;
              border: 1px solid #df2027;
              background: white;
              color: #df2027;
              font-weight: bold;
            ">
            <i class="fas fa-location-arrow"></i>
            Tính khoảng cách từ vị trí của tôi
          </button>
        </div>

        <div id="list-result">
          <div
            class="store-card"
            onclick="updateMap('Convenia 113 Nguyễn Gia Trí, Phường 25, Bình Thạnh', 10.8044, 106.7157)">
            <h4>Convenia - Nguyễn Gia Trí</h4>
            <p>
              <i class="fas fa-map-pin"></i>
              113 Nguyễn Gia Trí, P.25, Bình Thạnh
            </p>
            <p class="distance-info"></p>
            <button class="btn-route" onclick="openNav(10.8044, 106.7157)">Chỉ đường đi</button>
          </div>

          <div
            class="store-card"
            onclick="updateMap('Convenia 74 Nguyễn Văn Thương, Phường 25, Bình Thạnh', 10.8018, 106.7192)">
            <h4>Convenia - Nguyễn Văn Thương</h4>
            <p>
              <i class="fas fa-map-pin"></i>
              74 Nguyễn Văn Thương, P.25, Bình Thạnh
            </p>
            <p class="distance-info"></p>
            <button class="btn-route" onclick="openNav(10.8018, 106.7192)">Chỉ đường đi</button>
          </div>

          <div
            class="store-card"
            onclick="updateMap('Convenia 475 Điện Biên Phủ, Phường 25, Bình Thạnh', 10.8016, 106.7118)">
            <h4>Convenia - Điện Biên Phủ</h4>
            <p>
              <i class="fas fa-map-pin"></i>
              475 Điện Biên Phủ, P.25, Bình Thạnh
            </p>
            <p class="distance-info"></p>
            <button class="btn-route" onclick="openNav(10.8016, 106.7118)">Chỉ đường đi</button>
          </div>

          <div
            class="store-card"
            onclick="updateMap('Convenia 92 Nguyễn Hữu Cảnh, Phường 22, Bình Thạnh', 10.7904, 106.7185)">
            <h4>Convenia - Nguyễn Hữu Cảnh</h4>
            <p>
              <i class="fas fa-map-pin"></i>
              92 Nguyễn Hữu Cảnh, P.22, Bình Thạnh
            </p>
            <p class="distance-info"></p>
            <button class="btn-route" onclick="openNav(10.7904, 106.7185)">Chỉ đường đi</button>
          </div>
        </div>
      </div>

      <div class="map-box">
        <iframe
          id="google-map"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15677.2!2d106.71!3d10.8!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317528a459cb43ab%3A0x6c3d40160a013d6c!2zQsOsbmggVGjhuqFuaCwgSOG7kyBDaMO Minh!5e0!3m2!1svi!2s!4v1711460000000"
          width="100%"
          height="100%"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"></iframe>
      </div>
    </div>

    <script>
      let userCoords = null;

      function updateMap(address, lat, lon) {
        const iframe = document.getElementById("google-map");
        const newSrc = `https://www.google.com/maps?q=${encodeURIComponent(address)}&output=embed`;
        iframe.src = newSrc;

        document.querySelectorAll(".store-card").forEach((card) => card.classList.remove("active"));
        event.currentTarget.classList.add("active");
      }

      // Hàm tính khoảng cách (Haversine)
      function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Bán kính Trái đất km
        const dLat = ((lat2 - lat1) * Math.PI) / 180;
        const dLon = ((lon2 - lon1) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return (R * c).toFixed(2);
      }

      function askLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              userCoords = {
                lat: position.coords.latitude,
                lon: position.coords.longitude,
              };
              displayDistances();
            },
            () => {
              alert("Vui lòng bật định vị trên trình duyệt để sử dụng tính năng này!");
            },
          );
        }
      }

      function displayDistances() {
        const cards = document.querySelectorAll(".store-card");
        // Giả lập tọa độ cho từng card (phù hợp với hàm onclick)
        const coords = [
          { lat: 10.8044, lon: 106.7157 },
          { lat: 10.8018, lon: 106.7192 },
          { lat: 10.8016, lon: 106.7118 },
          { lat: 10.7904, lon: 106.7185 },
        ];

        cards.forEach((card, index) => {
          const dist = calculateDistance(userCoords.lat, userCoords.lon, coords[index].lat, coords[index].lon);
          const distEl = card.querySelector(".distance-info");
          const btnEl = card.querySelector(".btn-route");
          distEl.innerHTML = `<i class="fas fa-walking"></i> Cách bạn: ${dist} km`;
          distEl.style.display = "block";
          btnEl.style.display = "inline-block";
        });
      }

      function openNav(lat, lon) {
        event.stopPropagation(); // Ngăn việc nhấn nút kích hoạt updateMap của card
        if (!userCoords) {
          window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`, "_blank");
        } else {
          window.open(
            `https://www.google.com/maps/dir/?api=1&origin=${userCoords.lat},${userCoords.lon}&destination=${lat},${lon}`,
            "_blank",
          );
        }
      }

      // Lọc danh sách khi tìm kiếm
      document.getElementById("store-search-input").addEventListener("input", function (e) {
        const filter = e.target.value.toLowerCase();
        const cards = document.querySelectorAll(".store-card");
        cards.forEach((card) => {
          const text = card.innerText.toLowerCase();
          card.style.display = text.includes(filter) ? "block" : "none";
        });
      });
    </script>
  </body>
</html>
