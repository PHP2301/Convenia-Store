<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hồ sơ cá nhân - Circle K</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i>
      Về trang chủ
    </a>

    <div class="profile-card">
      <div class="user-avatar-large" id="big-initial">?</div>
      <h3 id="display-email">Đang tải...</h3>
      <p style="color: #888; font-size: 0.8rem; margin-bottom: 25px">Hồ sơ thành viên Circle K</p>

      <form id="profile-form">
        <div class="input-group">
          <label>Họ và tên</label>
          <input type="text" id="profile-fullname" placeholder="Nhập họ tên" required />
        </div>

        <div class="input-group">
          <label>Số điện thoại</label>
          <input type="tel" id="profile-phone" placeholder="Nhập số điện thoại" required />
        </div>

        <div class="input-group">
          <label>Cửa hàng Circle K gần nhất</label>
          <div class="location-wrapper">
            <input type="text" id="user-location-display" placeholder="Nhấn nút để tìm store..." readonly />
            <button type="button" id="btn-get-location" class="btn-location" title="Lấy vị trí hiện tại">
              <i class="fas fa-location-crosshairs"></i>
            </button>
          </div>

          <select id="nearest-store-select">
            <option value="" disabled selected>-- Chọn chi nhánh --</option>
            <option value="ngt">Nguyễn Gia Trí</option>
            <option value="nvt">Nguyễn Văn Thương</option>
            <option value="dbp">Điện Biên Phủ</option>
            <option value="nhc">Nguyễn Hữu Cảnh</option>
          </select>
        </div>

        <div class="input-group">
          <label>Địa chỉ nhận hàng chi tiết</label>
          <input type="text" id="profile-address" placeholder="Số nhà, tên đường..." />
        </div>

        <button type="submit" id="btn-save-info" class="btn-save">LƯU THÔNG TIN</button>
      </form>

      <button class="btn-logout" id="btn-logout">Đăng xuất tài khoản</button>
    </div>

    <script type="module" src="js/profile.js"></script>
  </body>
</html>
