<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Circle K Việt Nam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/stylelogin.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  </head>
  <body>
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i>
      Quay lại trang chủ
    </a>

    <div class="main-container">
      <div class="form-section">
        <div id="authContent" style="width: 100%; display: flex; flex-direction: column; align-items: center">
          <img src="/img/images1.png" alt="Circle K Logo" class="form-logo" id="formLogo" style="display: none" />

          <h2 id="authTitle">Đăng nhập</h2>
          <form id="authForm">
            <div class="input-group">
              <label>Tên đăng nhập / Email</label>
              <i class="fas fa-envelope"></i>
              <input type="email" id="authEmail" placeholder="example@gmail.com" required />
            </div>

            <div id="registerOTPSection" class="otp-slide-wrapper">
              <p style="font-size: 12px; color: #df2027; font-weight: bold; text-align: center; margin-bottom: 10px">
                Mã xác thực đã gửi vào Email của bạn!
              </p>
              <div class="otp-input-container">
                <input type="text" class="otp-field" maxlength="1" />
                <input type="text" class="otp-field" maxlength="1" />
                <input type="text" class="otp-field" maxlength="1" />
                <input type="text" class="otp-field" maxlength="1" />
                <input type="text" class="otp-field" maxlength="1" />
                <input type="text" class="otp-field" maxlength="1" />
              </div>
              <input type="hidden" id="regOTPInput" />
            </div>

            <div class="input-group">
              <label>Mật khẩu</label>
              <i class="fas fa-lock"></i>
              <input type="password" id="authPassword" placeholder="********" required />
            </div>

            <div class="form-options" id="formOptions">
              <label>
                <input type="checkbox" />
                Ghi nhớ
              </label>
              <a
                href="javascript:void(0)"
                onclick="toggleForgot(true)"
                style="color: #df2027; text-decoration: none; font-weight: 600">
                Quên mật khẩu?
              </a>
            </div>

            <button type="submit" class="btn-submit" id="btnMainAction">ĐĂNG NHẬP NGAY</button>

            <button
              type="button"
              id="btnBackToLogin"
              class="btn-back-to-login"
              style="display: none"
              onclick="switchToLogin()">
              Quay lại Đăng nhập
            </button>
          </form>
        </div>

        <div id="forgotSection" style="display: none; width: 100%; max-width: 320px; text-align: center">
          <h2 style="color: #df2027">Khôi phục mật khẩu</h2>
          <div id="stepEmail">
            <div class="input-group" style="text-align: left">
              <label>Email khôi phục</label>
              <i class="fas fa-envelope"></i>
              <input type="email" id="forgotEmail" placeholder="example@gmail.com" />
            </div>
            <button type="button" class="btn-submit" onclick="sendOTP(event)">GỬI MÃ OTP</button>
          </div>
          <div id="stepOTP" style="display: none">
            <div class="input-group" style="text-align: left">
              <label>Nhập mã 6 số</label>
              <i class="fas fa-key"></i>
              <input type="text" id="otpInput" placeholder="xxxxxx" maxlength="6" />
            </div>
            <button type="button" class="btn-submit" onclick="verifyOTP()">XÁC NHẬN MÃ</button>
          </div>
          <div style="margin-top: 20px">
            <a
              href="javascript:void(0)"
              onclick="toggleForgot(false)"
              style="text-decoration: none; color: #666; font-size: 13px">
              Quay lại đăng nhập
            </a>
          </div>
        </div>
      </div>

      <div class="welcome-section">
        <a href="index.html">
          <img
            src="/img/images1.png"
            alt="Circle K Logo"
            style="width: 100px; margin-bottom: 20px; background: white; padding: 5px; border-radius: 5px" />
        </a>
        <h1 id="welcomeTitle">Chào mừng!</h1>
        <p id="welcomeDesc">Khám phá thế giới tiện lợi tại Circle K.</p>
        <p id="toggleText">Bạn chưa có tài khoản?</p>
        <button type="button" class="btn-register-outline" id="btnToggleAuth">ĐĂNG KÝ NGAY</button>
      </div>
    </div>

    <div id="notificationBox" class="notification-popup">
      <div class="notification-content">
        <i id="notificationIcon" class="fas"></i>
        <p id="notificationText"></p>
      </div>
    </div>

    <script>
      const otpFields = document.querySelectorAll(".otp-field");
      const hiddenOtp = document.getElementById("regOTPInput");

      otpFields.forEach((field, index) => {
        field.addEventListener("input", (e) => {
          if (e.target.value.length >= 1) {
            if (index < otpFields.length - 1) otpFields[index + 1].focus();
          }
          updateHiddenOTP();
        });

        field.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && index > 0) {
            otpFields[index - 1].focus();
          }
        });
      });

      function updateHiddenOTP() {
        let code = "";
        otpFields.forEach((f) => (code += f.value));
        hiddenOtp.value = code;
      }
    </script>
    <script type="module" src="js/auth.js"></script>
  </body>
</html>
