<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Circle K Việt Nam</title>
    <link rel="icon" type="image/png" href="./img/images.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="css/stylelogin.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  </head>
  <body>
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i>
      Quay lại trang chủ
    </a>

    <div class="main-container">
      <div class="form-section">
        <div id="authContent" style="width: 100%; display: flex; flex-direction: column; align-items: center">
          <img src="/img/images1.png" alt="Circle K Logo" class="form-logo" id="formLogo" style="display: none" />
          <h2 id="authTitle">Đăng nhập</h2>
          <form id="authForm">
            <div class="input-group">
              <label>Tên đăng nhập / Email</label>
              <i class="fas fa-envelope"></i>
              <input type="email" id="authEmail" placeholder="example@gmail.com" required />
            </div>

            <div class="input-group">
              <label>Mật khẩu</label>
              <i class="fas fa-lock"></i>
              <input type="password" id="authPassword" placeholder="Ít nhất 6 ký tự (chữ & số)" required />
              <div id="passwordStrength" class="strength-meter"></div>
            </div>

            <div class="input-group" id="rePasswordGroup" style="display: none">
              <label>Nhập lại mật khẩu</label>
              <i class="fas fa-check-double"></i>
              <input type="password" id="reAuthPassword" placeholder="********" />
            </div>

            <div id="registerOTPSection" class="otp-slide-wrapper" style="display: none">
              <p style="color: #df2027; font-weight: bold; margin-bottom: 15px">
                Mã xác thực đã gửi vào Email của bạn!
              </p>
              <div class="otp-input-container">
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
                <input type="text" class="otp-field reg-otp" maxlength="1" inputmode="numeric" />
              </div>
              <input type="hidden" id="regOTPInput" />
            </div>

            <div class="form-options" id="formOptions">
              <label>
                <input type="checkbox" />
                Ghi nhớ
              </label>
              <a
                href="javascript:void(0)"
                onclick="toggleForgot(true)"
                style="color: #df2027; text-decoration: none; font-weight: 600">
                Quên mật khẩu?
              </a>
            </div>

            <button type="submit" class="btn-submit" id="btnMainAction">ĐĂNG NHẬP NGAY</button>
            <button
              type="button"
              id="btnBackToLogin"
              class="btn-back-to-login"
              style="display: none"
              onclick="switchToLogin()">
              Quay lại Đăng nhập
            </button>
          </form>
        </div>

        <div id="forgotSection" style="display: none; width: 100%; flex-direction: column; align-items: center">
          <h2 style="text-align: center">Khôi phục mật khẩu</h2>

          <div id="stepEmail" style="width: 100%; max-width: 320px">
            <div class="input-group">
              <label>Email đăng ký</label>
              <input type="email" id="forgotEmail" placeholder="Nhập email của bạn" />
            </div>
          </div>

          <div id="stepOTP" style="display: none; width: 100%; text-align: center">
            <p style="color: #df2027; font-size: 13px; margin-bottom: 10px">Nhập mã OTP đã gửi đến Email</p>
            <div class="otp-input-container">
              <input type="text" class="otp-field f-otp" maxlength="1" />
              <input type="text" class="otp-field f-otp" maxlength="1" />
              <input type="text" class="otp-field f-otp" maxlength="1" />
              <input type="text" class="otp-field f-otp" maxlength="1" />
              <input type="text" class="otp-field f-otp" maxlength="1" />
              <input type="text" class="otp-field f-otp" maxlength="1" />
            </div>
            <input type="hidden" id="forgotOTPInput" />
          </div>

          <div id="resetPasswordSection" style="display: none; width: 100%; max-width: 320px">
            <div class="input-group">
              <label>Mật khẩu mới</label>
              <input type="password" id="newPassword" placeholder="Ít nhất 6 ký tự" />
            </div>
            <div class="input-group">
              <label>Xác nhận mật khẩu mới</label>
              <input type="password" id="confirmNewPassword" placeholder="Nhập lại mật khẩu mới" />
            </div>
          </div>

          <div style="width: 100%; max-width: 320px">
            <button type="button" id="btnForgotAction" class="btn-submit" onclick="handleForgotAction()">
              GỬI MÃ OTP
            </button>
            <button type="button" class="btn-back-to-login" onclick="toggleForgot(false)">Quay lại đăng nhập</button>
          </div>
        </div>
      </div>

      <div class="welcome-section">
        <a href="index.html">
          <img
            src="/img/images1.png"
            alt="Circle K Logo"
            style="width: 100px; margin-bottom: 20px; background: white; padding: 5px; border-radius: 5px" />
        </a>
        <h1 id="welcomeTitle">Chào mừng!</h1>
        <p id="welcomeDesc">Khám phá thế giới tiện lợi tại Circle K.</p>
        <p id="toggleText">Bạn chưa có tài khoản?</p>
        <button type="button" class="btn-register-outline" id="btnToggleAuth">ĐĂNG KÝ NGAY</button>
      </div>
    </div>

    <div id="notificationBox" class="notification-popup">
      <p id="notificationText"></p>
    </div>

    <script>
      // --- XỬ LÝ NHẢY Ô OTP CHO CẢ 2 FORM ---
      function setupOTP(selector, hiddenId) {
        const fields = document.querySelectorAll(selector);
        const hiddenInput = document.getElementById(hiddenId);
        fields.forEach((field, index) => {
          field.addEventListener("input", (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, "");
            if (e.target.value.length >= 1 && index < fields.length - 1) fields[index + 1].focus();
            let code = "";
            fields.forEach((f) => (code += f.value));
            hiddenInput.value = code;
          });
          field.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !e.target.value && index > 0) fields[index - 1].focus();
          });
        });
      }
      setupOTP(".reg-otp", "regOTPInput");
      setupOTP(".f-otp", "forgotOTPInput");

      // --- ĐIỀU KHIỂN UI ---
      window.toggleForgot = function (show) {
        document.getElementById("authContent").style.display = show ? "none" : "flex";
        document.getElementById("forgotSection").style.display = show ? "block" : "none";
      };

      // Đưa các hàm điều hướng vào window để JS Module gọi được
      window.switchToLogin = function () {
        window.location.hash = "";
        toggleForgot(false);
      };

      // Sức mạnh mật khẩu
      document.getElementById("authPassword").addEventListener("input", function () {
        const val = this.value;
        const meter = document.getElementById("passwordStrength");
        const hasLetter = /[a-zA-Z]/.test(val);
        const hasNumber = /[0-9]/.test(val);
        if (val.length === 0) meter.className = "strength-meter";
        else if (val.length < 6 || !hasLetter || !hasNumber) meter.className = "strength-meter strength-weak";
        else meter.className = "strength-meter strength-strong";
      });
    </script>

    <script type="module" src="js/auth.js"></script>
  </body>
</html>
