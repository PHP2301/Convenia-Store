<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CK GO Việt Nam - Thức ăn & Thức uống</title>
    <link rel="icon" type="image/png" href="../assets/img/images.png" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/css/products.css" />
    <link rel="stylesheet" href="../assets/css/theme-lang.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script type="module" src="../assets/js/theme-lang.js"></script>
  </head>
  <body>
    <header>
      <div class="main-header">
        <div class="logo">
          <a href="index.html" style="display: flex; align-items: center; gap: 6px; text-decoration: none;">
            <div style="background: #00b4d8; color: white; font-weight: bold; font-size: 22px; padding: 4px 10px; border-radius: 4px; font-family: 'Outfit', 'Segoe UI', sans-serif; letter-spacing: 0.5px; box-shadow: 0 2px 4px rgba(0, 180, 216, 0.2);">CK</div>
            <span style="color: #0077b6; font-weight: bold; font-size: 18px; font-family: 'Outfit', 'Segoe UI', sans-serif; letter-spacing: 0.5px;">GO</span>
          </a>
        </div>

        <nav class="main-nav">
          <a href="stores.html" style="text-decoration: none">
            <div class="nav-item">
              <i class="fas fa-map-marker-alt"></i>
              <span>Hệ thống CK GO</span>
            </div>
          </a>

          <div class="nav-item">
            <i class="fas fa-gift"></i>
            <span>Ưu đãi đặc biệt</span>
          </div>

          <div class="nav-item dropdown-menu">
            <i class="fas fa-hamburger"></i>
            <span>Thức ăn & Thức uống</span>
            <div class="dropdown-subs">
              <a href="food.html">
                <i class="fas fa-pizza-slice"></i>
                Thức ăn
              </a>
              <a href="drink.html">
                <i class="fas fa-glass-whiskey"></i>
                Thức uống
              </a>
              <a href="menu.html">
                <i class="fas fa-list"></i>
                Tất cả Menu
              </a>
            </div>
          </div>

          <div id="auth-zone">
            <a href="cart.html" class="cart-wrapper-link">
              <div id="cart-icon" class="cart-circle-icon">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count">0</span>
              </div>
            </a>
            <div class="store-info-header" style="color: white; font-size: 13px">
              <i class="fas fa-map-marker-alt" style="color: #ffb800"></i>
              <span>Cửa hàng:</span>
              <span id="display-store-name" style="font-weight: bold">Đang xác định...</span>
            </div>
            <a href="indexlogin.html" id="login-btn" class="nav-item" style="text-decoration: none">
              <i class="fas fa-user-circle"></i>
              <span>Đăng nhập</span>
            </a>

            <div id="user-profile-header" class="dropdown-user" style="display: none">
              <div
                class="avatar-wrapper"
                id="user-avatar-circle"
                style="display: flex; align-items: center; gap: 8px; cursor: pointer">
                <div
                  class="avatar-trigger"
                  style="
                    background: #ffb800;
                    width: 32px;
                    height: 32px;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: bold;
                    color: #fff;
                  ">
                  <span id="user-initial">P</span>
                </div>
                <span id="user-name-text" style="color: white; font-size: 13px; font-weight: 500">Tài khoản</span>
                <i class="fas fa-caret-down" style="color: white; font-size: 10px; margin-left: 5px"></i>
              </div>

              <div class="dropdown-content" id="myDropdown">
                <a href="admin.html" id="admin-link" style="display: none; color: #df2027; font-weight: bold">
                  <i class="fas fa-tasks"></i>
                  Quản lý kho
                </a>
                <a href="indexprofile.html">
                  <i class="fas fa-user"></i>
                  Thông tin cá nhân
                </a>
                <a href="#" id="btn-logout-header">
                  <i class="fas fa-sign-out-alt"></i>
                  Đăng xuất
                </a>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <section class="product-display">
      <h2 id="category-title">DANH MỤC</h2>
      <div id="product-list" class="product-grid"></div>
    </section>

    <script type="module" src="../assets/js/script.js"></script>
    <script type="module" src="../assets/js/display-products.js"></script>
  </body>
</html>
