<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử Nhập Xuất - CK GO Admin</title>
    <link rel="icon" type="image/png" href="../assets/img/icons/images.png" />
    <link rel="stylesheet" href="../assets/css/pages/admin.css" />
    <link rel="stylesheet" href="../assets/css/themes/theme-lang.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
    <script type="module" src="../assets/js/utils/theme-lang.js"></script>
  </head>
  <body>
    <!-- Nút hamburger cho mobile -->
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Mở menu">
      <i class="fas fa-bars"></i>
    </button>
    <!-- Overlay mờ khi sidebar mở -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-wrapper">
      <nav class="sidebar">
        <a
          href="index.html"
          class="sidebar-header"
          style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px; padding: 20px">
          <img src="../assets/img/icons/images1.png" alt="CK GO" width="50" />
          <span style="font-weight: bold; letter-spacing: 1px; color: white">ADMIN PANEL</span>
        </a>

        <ul class="nav-links">
          <li>
            <a href="admin.html">
              <i class="fas fa-boxes"></i>
              Quản lý kho
            </a>
          </li>

          <li class="active">
            <a href="order-history.html">
              <i class="fas fa-history"></i>
              Lịch sử nhập xuất
            </a>
          </li>
          <li>
            <a href="index.html">
              <i class="fas fa-sign-out-alt"></i>
              Thoát
            </a>
          </li>
        </ul>
      </nav>

      <main class="main-content">
        <header class="top-bar">
          <h2>
            <i class="fas fa-history"></i>
            Lịch sử Nhập/Xuất Kho Realtime
          </h2>
          <div class="admin-info">
            <span>
              Xin chào,
              <strong>Admin</strong>
            </span>
          </div>
        </header>

        <div class="control-panel" style="justify-content: flex-start;">
          <p style="color: var(--text-muted); font-size: 0.95rem;">
            <i class="fas fa-info-circle" style="color: var(--primary); margin-right: 8px;"></i>
            Dữ liệu biến động kho được đồng bộ tự động theo thời gian thực.
          </p>
        </div>

        <table class="history-table">
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>Sản phẩm</th>
              <th>Chi nhánh</th>
              <th>Số lượng</th>
              <th>Hành động</th>
              <th>Người thực hiện</th>
            </tr>
          </thead>
          <tbody id="history-content"></tbody>
        </table>
      </main>
    </div>

    <script type="module" src="../assets/js/pages/order-history.js"></script>
    <script>
      // Hamburger sidebar toggle
      const toggle = document.getElementById('sidebarToggle');
      const overlay = document.getElementById('sidebarOverlay');
      const sidebar = document.querySelector('.sidebar');
      if (toggle && overlay && sidebar) {
        toggle.addEventListener('click', () => {
          sidebar.classList.toggle('open');
          overlay.classList.toggle('open');
        });
        overlay.addEventListener('click', () => {
          sidebar.classList.remove('open');
          overlay.classList.remove('open');
        });
      }
    </script>
  </body>
</html>
